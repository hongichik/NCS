# Overrides for retailrocket DuoRec runs.
# Use together with seq.yaml:
# python run_seq.py --dataset=retailrocket --config_files "seq.yaml configs/duorec_retailrocket_tuned.yaml"

seed: 2020
reproducibility: True

# Keep full-sort eval and optimize for ranking quality at 10.
eval_setting: TO_LS,full
valid_metric: NDCG@10
topk: [10, 20, 50]

# Let training run long enough before early stop.
epochs: 200
eval_step: 1
stopping_step: 30

# A stronger default for DuoRec on sparse e-commerce data.
train_batch_size: 512
eval_batch_size: 2048
learning_rate: 0.001
weight_decay: 0.0

contrast: us_x
sim: dot
tau: 0.2
lmd: 0.1
lmd_sem: 0.3

hidden_dropout_prob: 0.3
attn_dropout_prob: 0.3

# Ensure local dataset folder is used.
data_path: ../../Data/DuoRec/